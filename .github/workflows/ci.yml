name: CI Build and Test

on:
  pull_request:
  push:
    branches: [ "Test" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make Maven wrappers executable
        run: |
          chmod +x SlaveSerevice/mvnw
          chmod +x MasterService/mvnw

      - name: Build Slave JAR
        run: |
          cd SlaveSerevice
          ./mvnw clean package -DskipTests

      - name: Build Master JAR
        run: |
          cd MasterService
          ./mvnw clean package -DskipTests

      - name: Build slave image
        run: docker build -t slave ./SlaveSerevice

      - name: Build master image
        run: docker build -t master ./MasterService

      - name: Create Docker network
        run: docker network create app-network

      - name: Run slave container
        run: |
          docker run -d \
            --name slave \
            --network app-network \
            -p 8081:8081 \
            slave

      - name: Run master container
        run: |
          docker run -d \
            --name master \
            --network app-network \
            -p 8080:8080 \
            master

      - name: Wait for services
        run: sleep 20

      - name: Test POST request
        run: |
          curl -f -X POST http://localhost:8080/master \
            -H "Content-Type: application/json" \
            -d '{"data":"hello"}'

      - name: Test GET request
        run: |
          curl -f http://localhost:8080/master/1

      - name: Cleanup
        if: always()
        run: |
          docker stop master slave || true
          docker rm master slave || true
          docker network rm app-network || true
      
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag images
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag slave ${{ secrets.DOCKERHUB_USERNAME }}/slave:latest
          docker tag master ${{ secrets.DOCKERHUB_USERNAME }}/master:latest

      - name: Push images
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/slave:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/master:latest